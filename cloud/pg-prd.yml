version: '3.1'

networks:
  keycloak_keycloak:
    external: true

services:
  pg-prd:
    container_name: pg-prd
    image: postgres:alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${PG_PASS}
    ports:
      - "5432:5432"
    volumes:
      - /pg/prd:/var/lib/postgresql/data
    networks:
      keycloak_keycloak: