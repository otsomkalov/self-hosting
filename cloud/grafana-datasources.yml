apiVersion: 1

datasources:
  # Prometheus data source for metrics
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  # Jaeger data source for traces
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://tempo:3200

  # Loki data source for logs
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100