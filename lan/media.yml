networks:
  media:

volumes:
  downloads:
  qbittorrent:
  jellyfin-cfg:
  jellyfin-cache:
  media-file-browser:
  jackett-data:

services:
  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - AUTO_UPDATE=true #optional
    volumes:
      - jackett-data:/config
      - /mnt/downloads:/downloads
    expose:
      - 9117
    networks:
      - media
  oauth2-jackett:
    container_name: oauth2-jackett
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    restart: unless-stopped
    environment: 
      OAUTH2_PROXY_PROVIDER: keycloak-oidc
      OAUTH2_PROXY_CLIENT_ID: ${CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${COOKIE_SECRET}
      OAUTH2_REDIRECT_URL: https://jackett.server.home/oauth2/callback
      OAUTH2_PROXY_UPSTREAMS: http://jackett:9117
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${ISSUER_URL}
      OAUTH2_PROXY_REVERSE_PROXY: true
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_CODE_CHALLENGE_METHOD: S256
    volumes:
      - "./oauth2-proxy.cfg:/oauth2-proxy.cfg"
    expose:
      - 4180
    depends_on:
      - jackett
    networks:
      - media

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=8080
    volumes:
      - qbittorrent:/config
      - /mnt/downloads:/downloads
    expose:
      - "8080"
      - "6881"
    networks:
      - media

  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: "1000:1000"
    group_add:
      - "109"
      - "44"
      - "106"
    volumes:
      - jellyfin-cfg:/config
      - jellyfin-cache:/cache
      - /mnt/downloads:/media
    restart: always
    ports:
      - "1900:1900/udp"
      - "7359:7359/udp"
      - "8920:8920/tcp"
      - "8096:8096/tcp"
    environment:
      - JELLYFIN_PublishedServerUrl=https://192.168.3.254
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    networks:
      - media

  downloads-file-browser:
    container_name: downloads-file-browser
    image: hurlenko/filebrowser
    user: "1000:1000"
    expose:
      - "8080"
    volumes:
      - /mnt/downloads:/data
      - media-file-browser:/config
    environment:
      - FB_BASEURL=/
      - FB_NOAUTH=true
    restart: always
    networks:
      - media
