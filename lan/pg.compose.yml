name: pg

networks:
  general_general:
    external: true

volumes:
  pg:

services:
  pg:
    image: postgres:alpine
    container_name: pg
    restart: always
    environment:
      POSTGRES_PASSWORD: ${PG_PASS}
    ports:
      - "5432:5432"
    volumes:
      - pg:/var/lib/postgresql
    networks:
      - general_general