name: open-observe

volumes:
  open-observe:

services:
  open-observe:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: open-observe
    volumes:
      - open-observe:/data
    environment:
      - ZO_DATA_DIR=/data
      - ZO_ROOT_USER_EMAIL=root@example.com
      - ZO_ROOT_USER_PASSWORD=Complexpass#123
    ports:
      - "5080:5080"
      - "5081:5081"