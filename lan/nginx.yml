networks:
  general_general:
    external: true
  monitoring_monitoring:
    external: true
  aspire_monitoring:
    external: true

services:
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
    volumes:
      - ${CFG_PATH}:/etc/nginx
      - ${CERTS_PATH}/_wildcard.server.home.pem:/etc/nginx/cert.pem:ro
      - ${CERTS_PATH}/_wildcard.server.home-key.pem:/etc/nginx/key.pem:ro
    networks:
      - general_general
      - monitoring_monitoring
      - aspire_monitoring