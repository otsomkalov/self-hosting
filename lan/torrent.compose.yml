name: torrent

networks:
  general_general:
    external: true

volumes:
  torrent:
  media_qbittorrent:
    external: true

services:
  torrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: torrent
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=8080
    expose:
      - "8080"
      - "6881"
    volumes:
      - torrent:/config
      - media_qbittorrent:/old_config
      - /mnt/downloads:/downloads
    networks:
      - general_general

  oauth2-torrent:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: oauth2-torrent
    restart: unless-stopped
    environment: 
      OAUTH2_PROXY_PROVIDER: keycloak-oidc
      OAUTH2_PROXY_CLIENT_ID: ${CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${COOKIE_SECRET}
      OAUTH2_REDIRECT_URL: https://torrent.server.home/oauth2/callback
      OAUTH2_PROXY_UPSTREAMS: http://torrent:8080
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${ISSUER_URL}
      OAUTH2_PROXY_REVERSE_PROXY: true
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_CODE_CHALLENGE_METHOD: S256
    volumes:
      - "./oauth2-proxy.cfg:/oauth2-proxy.cfg"
    expose:
      - 4180
    depends_on:
      - torrent
    networks:
      - general_general